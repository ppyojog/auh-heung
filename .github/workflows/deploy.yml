name: Deploy AuhHeung to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.5'   # --web-renderer 플래그 지원 버전 고정

      - name: Install dependencies
        run: flutter pub get

      # CanvasKit + --no-web-resources-cdn: wasm을 앱 도메인(GitHub Pages)에 동봉해 로컬 로드
      # (iOS에서 CDN 페치 실패로 화면 비던 알려진 이슈의 정석 해결책).
      # 두 개를 한 번에 빌드·배포: 현재 게임=루트, Flame 검증 슬라이스=/lab (폰에서 A/B 비교)
      - name: Build web — 현재 게임(루트) + Flame 슬라이스(/lab)
        run: |
          set -e
          REPO="${{ github.event.repository.name }}"
          flutter build web --release --web-renderer canvaskit --no-web-resources-cdn --base-href "/$REPO/"
          rm -rf site && mkdir -p site
          cp -r build/web/. site/
          flutter build web --release --web-renderer canvaskit --no-web-resources-cdn --base-href "/$REPO/lab/" -t lib/lab.dart
          mkdir -p site/lab
          cp -r build/web/. site/lab/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
