name: Deploy AuhHeung to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.5'   # --web-renderer 플래그 지원 버전 고정

      - name: Install dependencies
        run: flutter pub get

      # 렌더러 분리:
      #  - 루트(현재 게임)=html → 그래픽 정확(애플 컬러 이모지, CanvasKit 렌더 깨짐 없음)
      #  - /lab(Flame)=canvaskit+로컬wasm → 게임엔진 성능 검증(Flame은 canvaskit 필요)
      - name: Build web — 현재 게임(루트, html) + Flame 슬라이스(/lab, canvaskit)
        run: |
          REPO="${{ github.event.repository.name }}"
          # 루트(현재 게임) — html 렌더러, 반드시 성공해야 배포
          flutter build web --release --web-renderer html --base-href "/$REPO/"
          rm -rf site && mkdir -p site
          cp -r build/web/. site/
          # Flame lab — canvaskit + 로컬wasm. 에러는 사이트에 로그로 남겨 원격 확인(루트 배포는 막지 않음)
          rm -rf build/web
          flutter build web --release --web-renderer canvaskit --no-web-resources-cdn --base-href "/$REPO/lab/" -t lib/lab.dart > lab_build.log 2>&1 || true
          cp lab_build.log site/lab_build.log
          if [ -f build/web/main.dart.js ]; then mkdir -p site/lab && cp -r build/web/. site/lab/; echo "lab OK"; else echo "lab build FAILED (see /lab_build.log)"; fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
